name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v4

      # Install both the matrix JDK and JDK 21 (needed to run Gradle 9.x).
      # The last entry becomes JAVA_HOME, so 21 runs the build; the test task
      # is launched on the matrix JDK via -Ptest.java.
      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            ${{ matrix.java }}
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build and test
        run: ./gradlew build "-Ptest.java=${{ matrix.java }}" --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-jdk-${{ matrix.java }}
          path: build/reports/tests/test/

  lint:
    name: Lint (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-
      - run: ./gradlew checkstyleMain spotbugsMain --stacktrace

  release-tag-check:
    name: Verify release tag
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Version.VERSION
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          SRC_VERSION=$(grep -E '^\s*public\s+static\s+final\s+String\s+VERSION' \
              src/main/java/ai/webscraping/Version.java | sed -E 's/.*"([^"]+)".*/\1/')
          BUILD_VERSION=$(grep -E '^version\s*=' build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG_VERSION  source=$SRC_VERSION  build=$BUILD_VERSION"
          if [ "$TAG_VERSION" != "$SRC_VERSION" ] || [ "$TAG_VERSION" != "$BUILD_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Version.VERSION ($SRC_VERSION) or build.gradle.kts ($BUILD_VERSION)"
            exit 1
          fi
